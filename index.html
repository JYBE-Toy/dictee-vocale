
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Dictée Vocale</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    textarea { width: 100%; height: 200px; margin-top: 10px; }
    button { margin: 5px; padding: 10px 15px; }
    label { display: block; margin-top: 10px; }
  </style>
</head>
<body>
  <h1>Dictée Vocale</h1>
  <div>
    <button id="startStopBtn">Démarrer</button>
    <button onclick="addLineBreak()">Aller à la ligne</button>
    <button onclick="copyText()">Copier</button>
    <button onclick="clearText()">Effacer</button>
    <button onclick="saveText()">Enregistrer</button>
    <label>
      <input type="checkbox" id="punctuationToggle" checked>
      Ponctuation automatique
    </label>
  </div>
  <textarea id="transcript" placeholder="Votre texte dicté apparaîtra ici..."></textarea>

  <script>
    const startStopBtn = document.getElementById('startStopBtn');
    const transcriptArea = document.getElementById('transcript');
    const punctuationToggle = document.getElementById('punctuationToggle');

    let recognition;
    let isRecognizing = false;

    if ('webkitSpeechRecognition' in window) {
      recognition = new webkitSpeechRecognition();
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.lang = 'fr-FR';

      recognition.onresult = (event) => {
        let finalTranscript = '';
        for (let i = event.resultIndex; i < event.results.length; ++i) {
          let transcript = event.results[i][0].transcript;
          if (!punctuationToggle.checked) {
            transcript = transcript.replace(/[.,!?]/g, '');
          }
          if (event.results[i].isFinal) {
            finalTranscript += transcript + ' ';
          }
        }
        transcriptArea.value += finalTranscript;
      };

      recognition.onerror = (event) => {
        console.error('Erreur de reconnaissance vocale:', event.error);
      };
    } else {
      alert("Votre navigateur ne supporte pas la reconnaissance vocale.");
    }

    startStopBtn.onclick = () => {
      if (isRecognizing) {
        recognition.stop();
        startStopBtn.textContent = 'Démarrer';
      } else {
        recognition.start();
        startStopBtn.textContent = 'Arrêter';
      }
      isRecognizing = !isRecognizing;
    };

    function addLineBreak() {
      transcriptArea.value += '\n';
    }

    function copyText() {
      navigator.clipboard.writeText(transcriptArea.value);
    }

    function clearText() {
      transcriptArea.value = '';
    }

    function saveText() {
      const blob = new Blob([transcriptArea.value], { type: 'text/plain' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = 'dictee.txt';
      link.click();
    }
  </script>
</body>
</html>
